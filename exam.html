<!DOCTYPE html>
<html lang="si">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="exam-container">
        <div class="top-bar">
            <button onclick="goHome()">Home</button>
            <div id="timer">--:--</div>
            <button onclick="checkSubmit()">Submit</button>
        </div>
        <div id="question-box"></div>
        <div class="nav-container">
            <button onclick="changeQ(-1)">Previous</button>
            <button onclick="changeQ(1)">Next</button>
        </div>
        
        <div id="indicator" class="indicator"></div>
        
    </div>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-body"></p>
            <div id="modal-actions-container" class="modal-actions"></div>
        </div>
    </div>
<div style="text-align: center; margin-top: 40px; margin-bottom: 20px; font-size: 14px; color: #8e8d8a; border-top: 0.5px solid #262628; padding-top: 20px;">
    <!-- 📝 System Text -->
    <p style="margin: 5px 0; color: #8e8d8a;">SSW Agriculture Exam System | <span id="year-display">2026</span></p>
    
    <!-- 🔒 ලින්ක් එකක් නොවන, ක්ලික් කළ නොහැකි ස්ථාවර ගෝල්ඩන් පැහැති Copyright Text එක -->
    <span style="color: #c4b9a8; font-weight: bold; display: inline-block; margin-top: 5px;">
        © <span id="copy-year">2026</span> gnrzoop | GitHub
    </span>
</div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
