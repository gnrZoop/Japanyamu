<!DOCTYPE html>
<html lang="si">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>SSW Agriculture</title>
</head>
<body>
    <div class="exam-container">
        <h1>SSW Agriculture</h1>
        
        <div style="background: #fef7ff; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <h3>1. අභ්‍යාස සහ විභාග</h3>
            
            <p>ජපන් භාෂා ප්‍රවීණතා පරීක්ෂණය (පොදු)</p>
            <button style="width: 100%; margin-bottom: 15px;" onclick="window.open('https://gnrzoop.github.io/sswagrysinhala/', '_blank')">අභ්‍යාස වෙබ් පිටුව</button>

            <p>විභාග ප්‍රශ්න</p>
            <select id="paper-select" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 10px;"></select>
            <input type="number" id="time-input" placeholder="කාලය (විනාඩි 20 බැගින්)" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 10px; box-sizing: border-box;">
            <button style="width: 100%;" onclick="startExam()">විභාගය පටන් ගන්න</button>
        </div>

        <div style="background: #f4f4f4; padding: 15px; border-radius: 15px;">
            <h3>2. PDF බාගත කිරීම්</h3>
            
            <p>වගා කරන ලද කෘෂිකර්මාන්ත (耕種農業)</p>
            <button style="width: 100%; margin-bottom: 10px;" onclick="window.open('https://asat-nca.jp/si/images/asat_cf_si.pdf', '_blank')">සිංහල PDF</button>

            <p>පශු සම්පත් කෘෂිකර්මාන්තය (畜産農業)</p>
            <button style="width: 100%; margin-bottom: 10px;" onclick="window.open('https://asat-nca.jp/si/images/asat_lf_si.pdf', '_blank')">සිංහල PDF</button>

            <p>ජපන් භාෂා පාඩම්</p>
            <button style="width: 100%;" onclick="window.open('https://asat-nca.jp/si/images/japanese_text.pdf', '_blank')">PDF බාගන්න</button>
        </div>
    </div>
        <div style="text-align: center; margin-top: 25px; overflow: hidden;">
            <img src="https://count.getloli.com/get/@gnrzoop-ssw-agri" alt="visitor counter" style="max-width: 100%; height: auto;">
        </div>

       
    
     <div style="text-align: center; margin-top: 20px; margin-bottom: 20px; font-size: 14px; color: #555; border-top: 1px solid #ddd; padding-top: 20px;">
            <p style="margin: 5px 0;">SSW Agriculture Exam System | <span id="year-display">2026</span></p>
            <a href="https://github.com/gnrzoop" target="_blank" style="text-decoration: none; color: #6750a4; font-weight: bold;">
                © <span id="copy-year">2026</span> gnrzoop | GitHub
            </a>
        </div>

    <script>
        // වර්තමාන වර්ෂය ස්වයංක්‍රීයව යාවත්කාලීන කිරීම
        const currentYear = new Date().getFullYear();
        document.getElementById('year-display').innerText = currentYear;
        document.getElementById('copy-year').innerText = currentYear;
    </script>
    <script src="data.js"></script>
    <script>
        const select = document.getElementById('paper-select');
        for (let id in allPapers) {
            select.innerHTML += `<option value="${id}">${allPapers[id].title}</option>`;
        }
        
        function startExam() {
            localStorage.setItem('paperId', select.value);
            localStorage.setItem('time', document.getElementById('time-input').value);
            window.location.href = 'exam.html';
        }
    </script>
</body>
</html>
